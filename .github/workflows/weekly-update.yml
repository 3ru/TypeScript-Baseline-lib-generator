name: Weekly Update

on:
  schedule:
    - cron: "0 15 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize so a scheduled run and a manual dispatch don't fight over the
# same automation branch.
concurrency:
  group: weekly-update
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      - name: Run static JS checks
        run: npm run lint

      - name: Pin latest web-features release
        run: npm install --save-exact "web-features@$(npm view web-features dist-tags.latest)"

      - name: Update manifest and dataset
        run: npm run update:web-features -- --snapshot-date "$(date -u +%F)"

      - name: Validate compat-management schema
        run: npm run validate:registry

      - name: Verify pinned web-features dataset
        run: npm run verify:dataset

      - name: Regenerate baseline
        run: npm run generate

      - name: Run standalone validation
        run: npm test

      - name: Prepare pull request body
        run: npm run write:update-pr-body -- --out .tmp/baseline-lib-update-pr.md --summary-out .tmp/baseline-lib-update-summary.json

      # By GitHub design, PRs opened with the default GITHUB_TOKEN don't trigger
      # any pull_request workflow (validate / test-typescript / package-dry-run).
      # Set AUTOMATION_TOKEN (a fine-grained PAT or GitHub App token) to run CI
      # on bot PRs too.
      - name: Warn when AUTOMATION_TOKEN is not configured
        env:
          AUTOMATION_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
        run: |
          if [ -z "$AUTOMATION_TOKEN" ]; then
            message="AUTOMATION_TOKEN is not set, so PRs created by this workflow won't run pull_request CI automatically. Register a fine-grained PAT (contents: write / pull-requests: write) as AUTOMATION_TOKEN in the repository secrets."
            echo "::warning title=CI won't run on bot PRs::${message}"
            echo "> [!WARNING]" >> "$GITHUB_STEP_SUMMARY"
            echo "> ${message}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.AUTOMATION_TOKEN || github.token }}
          branch: automation/weekly-web-features-update
          delete-branch: true
          commit-message: "chore: update web-features baseline snapshot"
          title: "chore: update web-features baseline snapshot"
          body-path: .tmp/baseline-lib-update-pr.md
