name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      - name: Run static JS checks
        run: npm run lint

      - name: Validate compat-management schema
        run: npm run validate:registry

      - name: Regenerate baseline
        run: npm run generate

      - name: Verify checked-in generated artifacts
        run: git diff --exit-code -- derived/current generated/current

      - name: Run standalone validation
        run: npm test
